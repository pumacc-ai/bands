"""
Bands — GraphQL API Schema
==========================
Manage bands, events, admins, and permissions.
"""

type Band {
  id:              ID!
  name:            String!
  genre:           String!
  registrantEmail: String
  formedAt:        String!
  createdAt:       String!
}

type Event {
  id:        ID!
  bandId:    ID
  title:     String!
  venue:     String!
  eventDate: String
  createdAt: String!
}

type Admin {
  id:        ID!
  email:     String!
  name:      String!
  createdAt: String!
}

type Permission {
  id:        ID!
  adminId:   ID!
  resource:  String!
  action:    String!
  createdAt: String!
}

type Query {
  "All bands ordered by formation date"
  bands: [Band!]!
  "Single band by ID"
  band(id: ID!): Band
  "Full-text search across band name and genre"
  searchBands(query: String!): [Band!]!
  "All bands registered by a Facebook-authenticated email"
  myBands(email: String!): [Band!]!
  "Events, optionally filtered by band"
  events(bandId: ID): [Event!]!
  "All admins"
  admins: [Admin!]!
  "Permissions for an admin"
  permissions(adminId: ID!): [Permission!]!
}

type Mutation {
  "Create a new band (ID generated by database)"
  createBand(name: String!, genre: String!, registrantEmail: String): Band!
  "Delete a band (admin — no ownership check)"
  deleteBand(id: ID!): Boolean!
  "Delete a band only if the email matches the registrant (user self-service)"
  unregisterBand(id: ID!, email: String!): Boolean!
  "Delete all bands and personal data for a Facebook-authenticated email; returns deleted row count"
  deleteMyData(email: String!): Int!
  "Create an event"
  createEvent(bandId: ID, title: String!, venue: String!, eventDate: String): Event!
  "Delete an event"
  deleteEvent(id: ID!): Boolean!
  "Create an admin account"
  createAdmin(email: String!, name: String!): Admin!
  "Grant a permission to an admin"
  grantPermission(adminId: ID!, resource: String!, action: String!): Permission!
  "Revoke a permission"
  revokePermission(id: ID!): Boolean!
}
