all:
  children:
    local:
      hosts:
        localhost:
          ansible_connection: local
          # System packages installed via brew (macOS) or apt/dnf/yum (Linux)
          packages:
            - jq
            - maven
          # Global npm packages
          npm_packages:
            - "@anthropic-ai/claude-code"
          # Bitwarden Secrets Manager UUID for the GitHub PAT.
          # Leave empty to skip writing GITHUB_TOKEN to ~/.profile.
          bw_secret_github_token: ""
          # Key=value pairs exported in ~/.profile
          profile_vars:
            NODE_ENV: development
            PORT: "3001"
            OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"
          # Claude Code plugin marketplaces and the plugins to install from each.
          claude_marketplaces:
            - name: claude-plugins-official
              repo: anthropics/claude-plugins-official
              plugins:
                - commit-commands
                - feature-dev
                - code-review
                - pr-review-toolkit
                - hookify
                - plugin-dev
                - claude-code-setup
                - claude-md-management
                - frontend-design
                - skill-creator
                - playground
                - ralph-loop
                - code-simplifier
                - learning-output-style
                - explanatory-output-style
            - name: anthropic-agent-skills
              repo: anthropics/skills
              plugins:
                - document-skills
    bands:
      vars:
        bands_user: bands
        ui_port: 3001
        app_dir: /opt/bands
        pg_db: bands
        pg_user: bands
      hosts:
        bands.pumacc.com:
          ansible_host: "138.197.51.150"
          ansible_user: "bands"
          web_title: "Bands"
          # UUIDs of Bitwarden Secrets Manager secrets (BWS_ACCESS_TOKEN must be set).
          bw_google_client_id: ""
          bw_google_client_secret: ""
          bw_pg_password: ""
          google_callback_url: "https://bands.pumacc.com/auth/google/callback"
          session_secret: ""
          # Key=value pairs exported in ~/.profile
          profile_vars:
            NODE_ENV: production
            PORT: "{{ ui_port }}"
            DATABASE_URL: "postgresql:///bands?user=bands&host=/var/run/postgresql"
            GITHUB_TOKEN: bw:38ceb435-3c92-4dcf-9bc9-b4000133acf7
            VITE_GOOGLE_MAPS_API_KEY: bw:38ceb435-3c92-4dcf-9bc9-b4000133acf7
            VITE_FACEBOOK_APP_ID: bw:f1f9f2ee8-8812-4a62-8ab4-b4120142ed4c
            VITE_FACEBOOK_APP_SECRET: bw:7375a29d-699e-4bb4-b010-b41201430ddb